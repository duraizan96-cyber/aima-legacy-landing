server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Ocultar versión de nginx ────────────────────────
    server_tokens off;

    # ── Headers de seguridad ────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.facebook.com; connect-src 'self' https://aprendiendo1-n8n.qtma3u.easypanel.host https://www.facebook.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/html text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Routing ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache para assets estáticos ─────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Denegar acceso a archivos ocultos ───────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
